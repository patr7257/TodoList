name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build all modules
        run: mvn -B clean package

      - name: Compute version
        id: ver
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in [1-9]*.[0-9]*.[0-9]*) ;; *) V=1.0.0 ;; esac
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Prepare Client jpackage input
        run: |
          New-Item -ItemType Directory -Force -Path client-jpackage-input
          Copy-Item client/target/todolist-client-1.0.0.jar client-jpackage-input/
          Copy-Item client/target/libs/*.jar client-jpackage-input/

      # Guard: jdeps computes the JDK modules the app actually references. If any
      # is not in the --add-modules list below, FAIL the build here instead of
      # shipping an installer that crashes silently at launch (as v2.0.0 did when
      # java.net.http was missing). Keep $declared in sync with --add-modules.
      - name: Guard against missing installer modules
        shell: pwsh
        run: |
          $declared = @('java.base','java.desktop','java.logging','java.naming','java.sql','java.xml','java.management','java.instrument','java.prefs','java.scripting','jdk.unsupported','jdk.jfr','jdk.crypto.ec','java.net.http','jdk.charsets','java.datatransfer','javafx.base','javafx.graphics','javafx.controls','javafx.fxml')
          $jars = (Get-ChildItem client-jpackage-input/*.jar).FullName
          $out = & jdeps --multi-release 21 --ignore-missing-deps --print-module-deps $jars 2>$null
          if (-not $out) { Write-Host 'jdeps produced no output; skipping guard'; exit 0 }
          $needed = ($out -join ',') -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -like 'java.*' -or $_ -like 'jdk.*' } | Sort-Object -Unique
          $missing = $needed | Where-Object { $declared -notcontains $_ }
          if ($missing) { Write-Error ('Installer --add-modules is missing: ' + ($missing -join ', ') + '. Add them to build-installers.yml (both jobs) and build-installers.ps1.'); exit 1 }
          Write-Host ('Module guard OK. jdeps-required: ' + ($needed -join ', '))

      # --win-upgrade-uuid is a PERMANENT upgrade code and must never change:
      # in-place upgrades are matched by it, so changing it orphans installed copies.
      # -Dtodolist.server.ip default comes from the TODOLIST_SERVER_HOST repo
      # variable (falls back to 127.0.0.1); the runtime connect dialog overrides it.
      - name: Create Windows Client Installer
        shell: cmd
        run: |
          jpackage ^
            --type msi ^
            --name "TodoList Client" ^
            --input client-jpackage-input ^
            --main-jar todolist-client-1.0.0.jar ^
            --main-class dk.dtu.ClientApp ^
            --app-version ${{ steps.ver.outputs.version }} ^
            --vendor "TodoList" ^
            --description "TodoList Management Client" ^
            --module-path client-jpackage-input ^
            --add-modules java.base,java.desktop,java.logging,java.naming,java.sql,java.xml,java.management,java.instrument,java.prefs,java.scripting,jdk.unsupported,jdk.jfr,jdk.crypto.ec,java.net.http,jdk.charsets,java.datatransfer,javafx.base,javafx.graphics,javafx.controls,javafx.fxml ^
            --win-menu ^
            --win-shortcut ^
            --icon client/src/main/resources/Icons/appicon.ico ^
            --win-upgrade-uuid c70294f3-9868-42a9-9ffc-7c3d80b71a4e ^
            --java-options "-Dtodolist.server.ip=${{ vars.TODOLIST_SERVER_HOST || '127.0.0.1' }}" ^
            --java-options "-Dtodolist.port=9001" ^
            --java-options "-Dtodolist.version=${{ steps.ver.outputs.version }}" ^
            --java-options "--add-opens" ^
            --java-options "javafx.controls/javafx.scene.control.skin=ALL-UNNAMED" ^
            --dest installers

      # Stable, versionless copies so releases/latest/download/<name> never breaks.
      - name: Create stable-named copies
        run: |
          Copy-Item "installers/TodoList Client-${{ steps.ver.outputs.version }}.msi" "installers/TodoList-Client-Windows.msi"

      - name: Upload Windows Installers to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*.msi
            installers/TodoList-Client-Windows.msi
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build all modules
        run: mvn -B clean package

      - name: Compute version
        id: ver
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in [1-9]*.[0-9]*.[0-9]*) ;; *) V=1.0.0 ;; esac
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Prepare Client jpackage input
        run: |
          mkdir -p client-jpackage-input
          cp client/target/todolist-client-1.0.0.jar client-jpackage-input/
          cp client/target/libs/*.jar client-jpackage-input/

      # Guard: fail if the app references a JDK module not in --add-modules below
      # (prevents the silent-launch-crash class of bug). Keep $declared in sync.
      - name: Guard against missing installer modules
        shell: pwsh
        run: |
          $declared = @('java.base','java.desktop','java.logging','java.naming','java.sql','java.xml','java.management','java.instrument','java.prefs','java.scripting','jdk.unsupported','jdk.jfr','jdk.crypto.ec','java.net.http','jdk.charsets','java.datatransfer','javafx.base','javafx.graphics','javafx.controls','javafx.fxml')
          $jars = (Get-ChildItem client-jpackage-input/*.jar).FullName
          $out = & jdeps --multi-release 21 --ignore-missing-deps --print-module-deps $jars 2>$null
          if (-not $out) { Write-Host 'jdeps produced no output; skipping guard'; exit 0 }
          $needed = ($out -join ',') -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -like 'java.*' -or $_ -like 'jdk.*' } | Sort-Object -Unique
          $missing = $needed | Where-Object { $declared -notcontains $_ }
          if ($missing) { Write-Error ('Installer --add-modules is missing: ' + ($missing -join ', ') + '. Add them to build-installers.yml (both jobs) and build-installers.ps1.'); exit 1 }
          Write-Host ('Module guard OK. jdeps-required: ' + ($needed -join ', '))

      # Build a macOS .icns from the client app icon (sips + iconutil are part of
      # macOS, so this is reliable on the runner).
      - name: Generate macOS app icon
        run: |
          SRC=client/src/main/resources/Icons/appicon.png
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size "$SRC" --out "icon.iconset/icon_${size}x${size}.png"
            sips -z $((size * 2)) $((size * 2)) "$SRC" --out "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o TodoList.icns

      # --mac-package-identifier is a PERMANENT bundle identifier and must never
      # change: it is how macOS tracks in-place upgrades of the same app.
      # -Dtodolist.server.ip default comes from the TODOLIST_SERVER_HOST repo
      # variable (falls back to 127.0.0.1); the runtime connect dialog overrides it.
      - name: Create macOS Client DMG
        run: |
          jpackage \
            --type dmg \
            --name "TodoList Client" \
            --input client-jpackage-input \
            --main-jar todolist-client-1.0.0.jar \
            --main-class dk.dtu.ClientApp \
            --app-version ${{ steps.ver.outputs.version }} \
            --vendor "TodoList" \
            --description "TodoList Management Client" \
            --module-path client-jpackage-input \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.sql,java.xml,java.management,java.instrument,java.prefs,java.scripting,jdk.unsupported,jdk.jfr,jdk.crypto.ec,java.net.http,jdk.charsets,java.datatransfer,javafx.base,javafx.graphics,javafx.controls,javafx.fxml \
            --icon TodoList.icns \
            --mac-package-identifier com.patr7257.todolist.client \
            --java-options "-Dtodolist.server.ip=${{ vars.TODOLIST_SERVER_HOST || '127.0.0.1' }}" \
            --java-options "-Dtodolist.port=9001" \
            --java-options "-Dtodolist.version=${{ steps.ver.outputs.version }}" \
            --java-options "--add-opens" \
            --java-options "javafx.controls/javafx.scene.control.skin=ALL-UNNAMED" \
            --dest installers

      # Stable, versionless copies so releases/latest/download/<name> never breaks.
      - name: Create stable-named copies
        run: |
          cp "installers/TodoList Client-${{ steps.ver.outputs.version }}.dmg" "installers/TodoList-Client-macOS.dmg"

      - name: Upload macOS Installers to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*.dmg
            installers/TodoList-Client-macOS.dmg
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
